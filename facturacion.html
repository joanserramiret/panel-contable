<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f1f5c">
<title>Facturador de cuotas · JS-Tech</title>
<style>
  :root{ --azul:#0f1f5c; --azul2:#1e1b4b; --acc:#3b82f6; --ok:#16a34a; --amb:#d97706;
         --bg:#f1f5f9; --card:#fff; --line:#e2e8f0; --txt:#0f172a; --mut:#64748b; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
        background:var(--bg); color:var(--txt); -webkit-text-size-adjust:100%; }
  header{ background:linear-gradient(135deg,var(--azul),var(--azul2)); color:#fff; padding:18px 20px 16px; }
  header h1{ margin:0 0 2px; font-size:20px; font-weight:700; letter-spacing:-.2px; }
  header .sub{ font-size:13px; opacity:.85; }
  .bar{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-top:14px; }
  .bar label{ font-size:12px; opacity:.85; margin-right:4px; }
  .bar input[type=month]{ font-size:15px; padding:7px 10px; border-radius:9px; border:0; }
  .pill{ background:rgba(255,255,255,.15); border-radius:20px; padding:6px 13px; font-size:13px; font-weight:600; }
  .pill b{ font-size:15px; }
  .wrap{ max-width:920px; margin:0 auto; padding:16px 14px 120px; }
  .toolbar{ display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin:6px 0 14px; }
  .btn{ border:0; border-radius:10px; padding:9px 15px; font-size:14px; font-weight:600; cursor:pointer; }
  .btn.sec{ background:#e2e8f0; color:#334155; }
  .btn.gho{ background:#fff; color:#334155; border:1px solid var(--line); }
  .btn.pri{ background:var(--acc); color:#fff; }
  .muted{ color:var(--mut); font-size:13px; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:14px; margin:0 0 12px;
         padding:13px 14px; box-shadow:0 1px 2px rgba(0,0,0,.03); }
  .card.off{ opacity:.55; }
  .card.aviso{ border-color:#fcd34d; background:#fffdf5; }
  .chead{ display:flex; align-items:flex-start; gap:10px; }
  .chk{ width:22px; height:22px; flex:0 0 auto; margin-top:2px; }
  .cinfo{ flex:1; min-width:0; }
  .cname{ font-weight:700; font-size:15px; line-height:1.25; }
  .cmeta{ font-size:12px; color:var(--mut); margin-top:2px; display:flex; flex-wrap:wrap; gap:6px 10px; align-items:center; }
  .badge{ background:#eef2ff; color:#4338ca; border-radius:6px; padding:1px 7px; font-weight:600; font-size:11px; }
  .badge.centro{ background:#ecfeff; color:#0e7490; }
  .badge.av{ background:#fef3c7; color:#92400e; }
  .ctot{ font-weight:700; font-size:16px; white-space:nowrap; }
  .lines{ margin-top:10px; border-top:1px dashed var(--line); padding-top:9px; }
  .ln{ display:grid; grid-template-columns: 1fr 78px 52px 30px; gap:6px; align-items:center; margin-bottom:6px; }
  .ln select,.ln input{ font-size:13px; padding:6px 7px; border:1px solid var(--line); border-radius:8px; width:100%; background:#fff; }
  .ln .num{ text-align:right; }
  .ln .del{ background:#fef2f2; color:#dc2626; border:0; border-radius:8px; font-size:15px; cursor:pointer; padding:6px 0; }
  .ln2{ display:grid; grid-template-columns: 1fr; gap:6px; margin:-2px 0 8px; }
  .ln2 input{ font-size:12px; padding:5px 8px; border:1px solid var(--line); border-radius:8px; width:100%; color:#475569; }
  .crow{ display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-top:8px; }
  .crow select{ font-size:13px; padding:6px 9px; border:1px solid var(--line); border-radius:8px; background:#fff; }
  .addln{ background:#f0f9ff; color:#0369a1; border:1px dashed #7dd3fc; border-radius:8px; padding:6px 11px; font-size:12px; font-weight:600; cursor:pointer; }
  .grp{ font-size:12px; font-weight:700; color:var(--mut); text-transform:uppercase; letter-spacing:.5px; margin:16px 4px 8px; }
  .foot{ position:fixed; left:0; right:0; bottom:0; background:#fff; border-top:1px solid var(--line);
         padding:11px 14px calc(11px + env(safe-area-inset-bottom)); display:flex; gap:10px; align-items:center; justify-content:space-between; }
  .foot .info{ font-size:13px; color:var(--mut); }
  .foot .info b{ color:var(--txt); font-size:15px; }
  .foot .btn.pri{ padding:11px 18px; font-size:15px; }
  .loading{ text-align:center; padding:50px 20px; color:var(--mut); }
  .modal-bg{ position:fixed; inset:0; background:rgba(15,23,42,.55); display:none; align-items:center; justify-content:center; padding:18px; z-index:50; }
  .modal{ background:#fff; border-radius:16px; max-width:560px; width:100%; max-height:84vh; overflow:auto; padding:18px 18px 16px; }
  .modal h3{ margin:0 0 4px; }
  .modal .row{ display:flex; justify-content:space-between; gap:10px; font-size:14px; padding:7px 0; border-bottom:1px solid var(--line); }
  .modal .row small{ color:var(--mut); }
  .note{ background:#f0f9ff; border:1px solid #bae6fd; color:#075985; border-radius:10px; padding:10px 12px; font-size:13px; margin-top:12px; }
  .vnav{ display:flex; gap:8px; margin:4px 0 14px; }
  .hcard{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:10px; }
  .hhead{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .hname{ font-weight:700; font-size:15px; }
  .hsub{ font-size:12px; color:var(--mut); margin-top:2px; }
  .htot{ font-weight:700; white-space:nowrap; }
  .st{ display:inline-flex; gap:3px; align-items:center; border-radius:6px; padding:2px 8px; font-size:11px; font-weight:600; margin:6px 5px 0 0; }
  .st.on{ background:#dcfce7; color:#166534; } .st.off{ background:#f1f5f9; color:#94a3b8; }
  .hbtns{ display:flex; flex-wrap:wrap; gap:6px; margin-top:9px; }
  .hbtns .btn{ padding:6px 11px; font-size:12px; }
  .hbar{ display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:12px; }
  @media(max-width:520px){ .ln{ grid-template-columns: 1fr 70px 46px 28px; } }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
<div id="login-ov" style="position:fixed;inset:0;background:linear-gradient(135deg,#0f1f5c,#1e1b4b);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px">
  <div style="background:#fff;border-radius:16px;padding:26px 24px;max-width:340px;width:100%;text-align:center;box-shadow:0 12px 44px rgba(0,0,0,.35)">
    <div style="font-size:30px">🧾</div>
    <h2 style="margin:6px 0 2px;font-size:19px;color:#0f1f5c">Facturador de cuotas</h2>
    <div style="color:#64748b;font-size:13px;margin-bottom:16px">JS Technology Menorca</div>
    <input id="lg-user" placeholder="Usuario" autocomplete="username" style="width:100%;box-sizing:border-box;margin-bottom:10px;padding:10px;border:1px solid #e2e8f0;border-radius:9px;font-size:15px">
    <input id="lg-pin" type="password" placeholder="PIN (déjalo vacío si no tienes)" autocomplete="current-password" style="width:100%;box-sizing:border-box;margin-bottom:14px;padding:10px;border:1px solid #e2e8f0;border-radius:9px;font-size:15px">
    <button class="btn pri" style="width:100%;padding:11px;font-size:15px" onclick="doLogin()">Entrar</button>
    <div id="lg-err" style="color:#dc2626;font-size:13px;margin-top:10px;min-height:18px"></div>
  </div>
</div>
<header>
  <h1>🧾 Facturador de cuotas</h1>
  <div class="sub">Propone las cuotas Ágora del mes clonando el mes anterior · solo cuotas (el material lo facturas tú)</div>
  <div class="bar">
    <span><label>Clonar del mes</label><input type="month" id="mes"></span>
    <span class="pill" id="pillDest">Propuesta para —</span>
    <span class="pill" id="pillN">—</span>
    <span class="pill" id="pillTot">—</span>
  </div>
</header>

<div class="wrap">
  <div class="vnav">
    <button class="btn pri" id="navProp">📝 Propuesta</button>
    <button class="btn gho" id="navHist">📋 Histórico</button>
    <button class="btn gho" id="navRem">🏦 Pendientes de remesar</button>
    <button class="btn gho" id="navAlb">🔧 Albaranes a facturar</button>
  </div>
  <div id="propView">
    <div class="toolbar">
      <button class="btn pri" id="bNueva">➕ Añadir cuota</button>
      <button class="btn pri" id="bTaylor">🔁 Replicar (Andrew)</button>
      <button class="btn gho" id="bAll">✓ Marcar todas</button>
      <button class="btn gho" id="bNone">▢ Desmarcar</button>
      <button class="btn gho" id="bProp">↺ Solo propuestas</button>
      <button class="btn gho" id="bAudit">🔍 Auditar duplicados</button>
      <span class="muted" id="diasInfo"></span>
    </div>
    <div id="list"><div class="loading">Cargando propuesta…</div></div>
  </div>
  <div id="histView" style="display:none"><div class="loading">Cargando histórico…</div></div>
  <div id="remView" style="display:none"><div class="loading">Cargando pendientes…</div></div>
  <div id="albView" style="display:none"><div class="loading">Cargando albaranes…</div></div>
</div>

<div class="foot">
  <div class="info" id="footInfo">—</div>
  <button class="btn pri" id="bEmit">Emitir seleccionadas</button>
</div>

<div class="modal-bg" id="mbg">
  <div class="modal" id="mbox"></div>
</div>

<script>
const API = 'https://panel.js-tech.es';
const FORMAS = { 8:'Recibo (domiciliado)', 4:'Transferencia' };
let CAT = [];          // catálogo de artículos de cuota
let PROPS = [];        // propuestas (estado editable)
let MESDEST = '';

const $ = s => document.querySelector(s);
const eur = n => (n||0).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
const esc = s => (s==null?'':(''+s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function mesActual(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function mesMas1(m){ let [y,mo]=m.split('-').map(Number); mo++; if(mo>12){mo=1;y++;} return y+'-'+String(mo).padStart(2,'0'); }
function nombreMes(m){ const [y,mo]=m.split('-').map(Number);
  return ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'][mo-1]+' '+y; }

// IVA por VatId (Ágora JST: 4 = 21%)
function ivaDe(vatid){ return 0.21; }
function lineaTotal(l){ return (Number(l.precio)||0) * (Number(l.cantidad)||0) * (1+ivaDe(l.vatid)); }
function propTotal(p){ return p.lineas.reduce((s,l)=>s+lineaTotal(l),0); }

async function cargar(){
  const mes = $('#mes').value || mesActual();
  MESDEST = mesMas1(mes);
  $('#pillDest').textContent = 'Propuesta para '+nombreMes(MESDEST);
  $('#list').innerHTML = '<div class="loading">Cargando propuesta de '+nombreMes(mes)+'…</div>';
  try{
    const r = await fetch(API+'/facturacion/propuesta?mes='+mes+'&nocache='+Date.now());
    const j = await r.json();
    if(!j.ok){ $('#list').innerHTML='<div class="loading">Error: '+esc(j.error||'')+'</div>'; return; }
    CAT = j.catalogo||[];
    PROPS = (j.cuotas||[]).map((c,i)=>({
      _id:i, sel: !!c.propon, cliente:c.cliente, cif:c.cif, customer_id:c.customer_id,
      centro:c.centro, centro_raw:c.centro_raw, aviso:c.aviso, atrasada:c.atrasada, dup:c.dup,
      origen:c.serie+'-'+c.numero, forma_pago_id: c.forma_pago_id||8,
      lineas: c.lineas.map(l=>({pid:l.pid, nombre:l.nombre, precio:l.precio, cantidad:l.cantidad, vatid:l.vatid, nota:l.nota||''}))
    }));
    $('#diasInfo').textContent = (j.dias_con_datos||[]).length+' días con datos · origen '+nombreMes(mes);
    try{ const fu=await fetch(API+'/facturacion/factura_unica?_='+Date.now()).then(r=>r.json()); window.FACT_UNICA = fu.clientes||{}; }catch(e){ window.FACT_UNICA = window.FACT_UNICA||{}; }
    render();
  }catch(e){ $('#list').innerHTML='<div class="loading">No se pudo cargar ('+esc(e.message)+')</div>'; }
}

function catOptions(pid){
  return CAT.map(a=>'<option value="'+a.pid+'"'+(a.pid===pid?' selected':'')+'>'+esc(a.nombre)+' ('+a.pid+')</option>').join('');
}

function render(){
  if(!PROPS.length){ $('#list').innerHTML='<div class="loading">No hay cuotas en ese mes.</div>'; resumen(); return; }
  let html=''; let lastCli=null; let folded=[];
  const flush=()=>{ if(folded.length){
    html += '<div style="margin:2px 0 10px;padding:6px 12px;background:#fffbeb;border:1px dashed #fcd34d;border-radius:8px;font-size:11.5px;color:#92400e">'
      + '↩ '+folded.length+' apartada(s), mes ya cubierto — no se proponen: '
      + folded.map(f=>esc(f.centro_raw||'cuota')+' ('+eur(propTotal(f))+')').join(' · ')+'</div>';
    folded=[]; } };
  PROPS.forEach(p=>{
    if(p.cliente!==lastCli){ flush();
      const fu = !!(window.FACT_UNICA && window.FACT_UNICA[p.customer_id]);
      const nCentros = PROPS.filter(x=>x.customer_id===p.customer_id).length;
      html += '<div class="grp">'+esc(p.cliente)+(p.cif?' · '+esc(p.cif):'')
        + (nCentros>1 ? ' <button onclick="toggleFacturaUnica('+p.customer_id+',\''+esc((p.cliente||'').replace(/\\/g,"").replace(/\x27/g,""))+'\',\''+esc(p.cif||'')+'\')" title="Agrupar TODOS los centros de este cliente en UNA sola factura (cuota desglosada por centro; el nombre del centro va en la última línea de cada bloque). Solo cuotas. Se puede desactivar." style="margin-left:10px;padding:3px 10px;border-radius:8px;border:1px solid '+(fu?'#0F6E56':'#cbd5e1')+';background:'+(fu?'#0F6E56':'#fff')+';color:'+(fu?'#fff':'#64748b')+';cursor:pointer;font-size:11px;font-weight:700;vertical-align:middle">'+(fu?'🧩 Factura única: SÍ ('+nCentros+' centros)':'🧩 Una sola factura')+'</button>' : '')
        + '</div>'; lastCli=p.cliente; }
    // Apartada por etiqueta de mes (puesta al día, no duplicado) → se pliega en una nota, no como tarjeta
    if(p.aviso && p.atrasada && !p.dup){ folded.push(p); }
    else html += card(p);
  });
  flush();
  $('#list').innerHTML = html;
  resumen();
}

function card(p){
  const tot = propTotal(p);
  const cls = 'card'+(p.sel?'':' off')+(p.aviso?' aviso':'');
  let lns='';
  p.lineas.forEach((l,li)=>{
    lns += '<div class="ln">'
      + '<select onchange="setArt('+p._id+','+li+',this.value)">'+catOptions(l.pid)+'</select>'
      + '<input class="num" type="number" step="0.01" value="'+(l.precio)+'" onchange="setVal('+p._id+','+li+',\'precio\',this.value)">'
      + '<input class="num" type="number" step="1" value="'+(l.cantidad)+'" onchange="setVal('+p._id+','+li+',\'cantidad\',this.value)">'
      + '<button class="del" onclick="delLn('+p._id+','+li+')" title="Quitar línea">🗑</button>'
      + '</div>'
      + '<div class="ln2"><input type="text" placeholder="Nota del centro (en esta línea)" value="'+esc(l.nota)+'" onchange="setVal('+p._id+','+li+',\'nota\',this.value)"></div>';
  });
  return '<div class="'+cls+'" id="card'+p._id+'">'
    + '<div class="chead">'
    +   '<input class="chk" type="checkbox" '+(p.sel?'checked':'')+' onchange="toggle('+p._id+',this.checked)">'
    +   '<div class="cinfo">'
    +     '<div class="cname">'+esc(p.cliente)+'</div>'
    +     '<div class="cmeta">'
    +        (p.centro?'<span class="badge centro">📍 '+esc(p.centro)+'</span>':'')
    +        (p.origen==='NUEVA'?'<span class="badge" style="background:#dcfce7;color:#166534">➕ nueva</span>':'<span class="badge">clona '+esc(p.origen)+'</span>')
    +        (p.aviso?'<span class="badge av">⚠ '+esc(p.aviso)+'</span>':'')
    +     '</div>'
    +   '</div>'
    +   '<div class="ctot" id="tot'+p._id+'">'+eur(tot)+'</div>'
    + '</div>'
    + '<div class="lines">'+lns
    +   '<div class="crow">'
    +     '<button class="addln" onclick="addLn('+p._id+')">+ Añadir línea</button>'
    +     '<span class="muted">Forma de pago:</span>'
    +     '<select onchange="setPago('+p._id+',this.value)">'
    +        '<option value="8"'+(p.forma_pago_id==8?' selected':'')+'>Recibo (domiciliado)</option>'
    +        '<option value="4"'+(p.forma_pago_id==4?' selected':'')+'>Transferencia</option>'
    +     '</select>'
    +   '</div>'
    + '</div>'
    + '</div>';
}

function recalcCard(id){
  const p = PROPS.find(x=>x._id===id); if(!p) return;
  const el = document.getElementById('tot'+id); if(el) el.textContent = eur(propTotal(p));
  resumen();
}
function setArt(id,li,pid){ const p=PROPS.find(x=>x._id===id); pid=Number(pid);
  const a=CAT.find(c=>c.pid===pid); p.lineas[li].pid=pid; p.lineas[li].saleformat=pid;
  if(a){ p.lineas[li].nombre=a.nombre; if(a.precio!=null) p.lineas[li].precio=a.precio; }
  render(); }
function setVal(id,li,k,v){ const p=PROPS.find(x=>x._id===id);
  p.lineas[li][k] = (k==='nota')? v : (Number(v)||0); recalcCard(id); }
function delLn(id,li){ const p=PROPS.find(x=>x._id===id); p.lineas.splice(li,1);
  if(!p.lineas.length){ p.sel=false; } render(); }
function addLn(id){ const p=PROPS.find(x=>x._id===id); const a=CAT[0];
  p.lineas.push({pid:a.pid, nombre:a.nombre, precio:0, cantidad:1, vatid:4, nota:''}); render(); }
function setPago(id,v){ const p=PROPS.find(x=>x._id===id); p.forma_pago_id=Number(v); }
function toggle(id,on){ const p=PROPS.find(x=>x._id===id); p.sel=on;
  const c=document.getElementById('card'+id); if(c)c.classList.toggle('off',!on); resumen(); }

function resumen(){
  const sel = PROPS.filter(p=>p.sel && p.lineas.length);
  const tot = sel.reduce((s,p)=>s+propTotal(p),0);
  const nAv = PROPS.filter(p=>p.aviso).length;
  $('#pillN').innerHTML = '<b>'+PROPS.length+'</b> cuotas'+(nAv?' · '+nAv+' ⚠':'');
  $('#pillTot').innerHTML = '<b>'+eur(tot)+'</b>';
  $('#footInfo').innerHTML = 'Seleccionadas <b>'+sel.length+'</b> · <b>'+eur(tot)+'</b>';
  $('#bEmit').textContent = 'Emitir seleccionadas ('+sel.length+')';
}

$('#bAll').onclick = ()=>{ PROPS.forEach(p=>p.sel=!!p.lineas.length); render(); };
$('#bNone').onclick = ()=>{ PROPS.forEach(p=>p.sel=false); render(); };
$('#bProp').onclick = ()=>{ PROPS.forEach(p=>p.sel=p.propon!==undefined?p.propon:!p.aviso); render(); };
$('#mes').onchange = cargar;

// ── Auditoría de duplicados (cobrados 2× → devolución) ──
$('#bAudit').onclick = async ()=>{
  const mes = $('#mes').value || mesActual();
  $('#mbox').innerHTML='<h3>🔍 Auditar duplicados</h3><div class="loading">Cruzando remesas y banco de '+nombreMes(mes)+'…</div>';
  $('#mbg').style.display='flex';
  try{
    const j = await fetch(API+'/facturacion/auditar_duplicados?mes='+mes+'&t='+Date.now()).then(r=>r.json());
    if(!j.ok){ $('#mbox').innerHTML='<h3>Error</h3><div class="note">'+esc(j.error||'')+'</div><div class="toolbar" style="justify-content:flex-end"><button class="btn sec" onclick="cerrarModal()">Cerrar</button></div>'; return; }
    if(!j.n){ $('#mbox').innerHTML='<h3>🔍 Auditar duplicados</h3><div class="note">No hay cuotas duplicadas (mismo cliente+importe) en '+nombreMes(mes)+'. 👍</div><div class="toolbar" style="justify-content:flex-end"><button class="btn pri" onclick="cerrarModal()">Cerrar</button></div>'; return; }
    const cards = j.duplicados.map(d=>{
      const dev = d.n_cobradas>=2;
      const facs = d.facturas.map(f=>'<div class="row"><span>'+esc(f.ref)+' · <small>'+f.forma_pago+' · '+f.fecha+'</small></span><span>'+(f.cobrada?'✅ '+esc(f.cobrada):'⬜ sin cobro')+'</span></div>').join('');
      return '<div class="hcard" style="'+(dev?'border-color:#fca5a5;background:#fef2f2':'')+'"><div class="hname">'+esc(d.cliente)+(d.centro?' · '+esc(d.centro):'')+' · '+eur(d.importe)+'</div>'
        +'<div style="margin:6px 0;font-weight:700;color:'+(dev?'#dc2626':'#166534')+'">'+(dev?'⚠️ ':'✓ ')+esc(d.veredicto)+'</div>'+facs+'</div>';
    }).join('');
    const tot = j.total_devolver? '<div class="note" style="background:#fef2f2;border-color:#fca5a5;color:#991b1b">Total a devolver estimado: <b>'+eur(j.total_devolver)+'</b></div>':'';

function selPayload(){
  const sel = PROPS.filter(p=>p.sel && p.lineas.length);
  const out = []; const merged = {};
  sel.forEach(p=>{
    const lineas = p.lineas.map(l=>({saleformat:l.saleformat, pid:l.pid, nombre:l.nombre, precio:l.precio,
        cantidad:l.cantidad, vatid:l.vatid, vatrate:l.vatrate, nota:l.nota}));
    const base = {cliente:p.cliente, cif:p.cif, customer_id:p.customer_id, centro:p.centro,
        forma_pago_id:p.forma_pago_id, mes_destino:MESDEST, total:Number(propTotal(p).toFixed(2)), lineas:lineas};
    if(window.FACT_UNICA && window.FACT_UNICA[p.customer_id]){
      // FACTURA ÚNICA: el nombre del centro va en la ÚLTIMA línea de cada bloque; se concatenan los centros
      const lns = lineas.map(l=>Object.assign({},l));
      if(lns.length && p.centro){ lns[lns.length-1].nota = p.centro; }
      if(!merged[p.customer_id]){
        merged[p.customer_id] = {cliente:p.cliente, cif:p.cif, customer_id:p.customer_id, centro:'Varios centros',
          forma_pago_id:p.forma_pago_id, mes_destino:MESDEST, total:0, lineas:[], factura_unica:true};
        out.push(merged[p.customer_id]);
      }
      merged[p.customer_id].lineas = merged[p.customer_id].lineas.concat(lns);
      merged[p.customer_id].total = Number((merged[p.customer_id].total + base.total).toFixed(2));
    } else { out.push(base); }
  });
  return out;
}

    const j = await fetch(API+'/facturacion/factura_unica',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json());

var CABECERA_FACTURA_URL = 'https://joanserramiret.github.io/averias-jstech/cabecera_factura.png';
function fmC(v){ return (parseFloat(v)||0).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'; }
function fdC(s){ if(!s)return '—'; var d=new Date(s); return isNaN(d)?s:d.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function generarHTMLFactura(f){
  var c=f.Customer||{}; var lineas=[];

  var telCli=c.Phone||c.MobilePhone||c.Telephone||'';
  var tipoDoc=(f.Serie||'').indexOf('FD')===0||(f.Totals&&f.Totals.GrossAmount<0)?'FACTURA ABONO':'FACTURA';
  var grupos={};
  lineas.forEach(function(l){ var r=parseFloat(l.VatRate!=null?l.VatRate:0.21); if(r>1.999)r=r/100;
    var imp=parseFloat(l.TotalAmount!=null?l.TotalAmount:(parseFloat(l.Quantity||0)*parseFloat(l.UnitPrice||0))); grupos[r]=(grupos[r]||0)+imp; });
  var totalG=f.Totals?parseFloat(f.Totals.GrossAmount):Object.keys(grupos).reduce(function(s,r){return s+grupos[r];},0);
  var rates=Object.keys(grupos).sort();
  var ivaRows=rates.map(function(r){ var g=grupos[r],rr=parseFloat(r); var b=g/(1+rr),q=g-b;
    return {pct:(rr*100).toLocaleString('es-ES',{minimumFractionDigits:3,maximumFractionDigits:3})+'%',base:b,cuota:q,total:g}; });
  if(ivaRows.length===1&&f.Totals){ ivaRows[0].base=parseFloat(f.Totals.NetAmount); ivaRows[0].cuota=parseFloat(f.Totals.VatAmount); ivaRows[0].total=totalG; }

  var FILA=4.84,NOTA_LH=3.4;
  var gruposVis=lineas.map(function(l){

async function generarPDFBlobC(f){
  if(!window.jspdf||!window.html2canvas) throw new Error('Librerías PDF no cargadas.');
  const htmlDoc=generarHTMLFactura(f);
  const styleCss=(htmlDoc.match(/<style>([\s\S]*?)<\/style>/)||[])[1]||'';
  const bodyInner=(htmlDoc.match(/<body>([\s\S]*?)<\/body>/)||[])[1]||htmlDoc;
  const holder=document.createElement('div');
  holder.style.position='fixed'; holder.style.left='-10000px'; holder.style.top='0'; holder.style.width='794px'; holder.style.background='#fff';
  const styleEl=document.createElement('style'); styleEl.textContent=styleCss+' body{max-width:none !important;}'; holder.appendChild(styleEl);
  const content=document.createElement('div'); content.style.width='794px'; content.style.padding='32px 38px'; content.style.background='#fff'; content.innerHTML=bodyInner; holder.appendChild(content);
  document.body.appendChild(holder);
  try{
    const imgs=holder.querySelectorAll('img');
    await Promise.all(Array.from(imgs).map(img=>img.complete?Promise.resolve():new Promise(res=>{img.onload=res;img.onerror=res;})));
    const canvas=await html2canvas(holder,{scale:2,useCORS:true,backgroundColor:'#fff'});
    const {jsPDF}=window.jspdf; const pdf=new jsPDF('p','mm','a4');
    const pageW=210,pageH=297; const imgH=canvas.height*pageW/canvas.width; const imgData=canvas.toDataURL('image/jpeg',0.92);
    let heightLeft=imgH,position=0; pdf.addImage(imgData,'JPEG',0,position,pageW,imgH); heightLeft-=pageH;
    while(heightLeft>2){ position-=pageH; pdf.addPage(); pdf.addImage(imgData,'JPEG',0,position,pageW,imgH); heightLeft-=pageH; }
    return pdf.output('blob');
  } finally { document.body.removeChild(holder); }
}

      const amber=!d.devolver && !d.veces_cobrada;
      const verdict = d.devolver ? '⚠️ DOBLE COBRO — cobrada '+d.veces_cobrada+'× sin devolución → DEVOLVER'
        : (amber ? '⏳ en '+d.n_remesas+' remesas · aún sin cobrar — quítala de una'
                 : '✅ '+d.n_abonos+' abono(s) − '+d.n_devoluciones+' devolución(es) = neto '+d.veces_cobrada+' · re-giro normal (devuelta y re-girada)');
      return '<div class="hcard" style="'+(d.devolver?'border-color:#fca5a5;background:#fef2f2':(amber?'border-color:#fde68a;background:#fffbeb':''))+'">'
        +'<div class="hname">'+esc(d.factura)+' · '+esc(d.cliente||'')+'</div>'
        +'<div style="margin:6px 0;font-weight:700;color:'+(d.devolver?'#dc2626':(amber?'#92400e':'#166534'))+'">'+verdict+'</div>'
        +'<div style="font-size:11px;color:#64748b;margin:4px 0 2px">En remesas:</div>'+rem
        +'<div style="font-size:11px;color:#64748b;margin:6px 0 2px">Rastro en el banco:</div>'+trail+'</div>';
    }).join('');
    const tot=j.n_devolver?'<div class="note" style="background:#fef2f2;border-color:#fca5a5;color:#991b1b"><b>'+j.n_devolver+'</b> con doble cobro real → DEVOLVER.</div>':'<div class="note" style="background:#ecfdf5;border-color:#a7f3d0;color:#065f46">Ninguna cobrada dos veces. 👍 Cada una es una devuelta re-girada (neto 1) o un giro en vuelo aún sin cobrar.</div>';
    $('#mbox').innerHTML='<h3>🔍 Doble giro · '+j.anio+'</h3><div class="muted">'+j.n_doble_giro+' factura(s) en 2+ remesas. Resta DEVOLUCIONES, no solo cargos: neto = abonos − devueltos. Rojo = neto ≥2 (devolver) · verde = devuelta+re-girada (neto 1) · ámbar = en vuelo.</div>'
      +'<div style="margin-top:10px;max-height:55vh;overflow:auto">'+cards+'</div>'+tot
      +'<div class="toolbar" style="margin-top:12px;justify-content:flex-end"><button class="btn pri" onclick="cerrarModal()">Cerrar</button></div>';
  }catch(e){ $('#mbox').innerHTML='<h3>Error</h3><div class="note">'+esc(e.message)+'</div><div class="toolbar" style="justify-content:flex-end"><button class="btn sec" onclick="cerrarModal()">Cerrar</button></div>'; }
}
async function generarRemesaGlobal(){
  const pend=(REM&&REM.pendientes)||[]; if(!pend.length){ alert('No hay pendientes.'); return; }
  if(!confirm('Generar remesa SEPA de '+pend.length+' facturas domiciliadas pendientes ('+eur(REM.total_pendiente)+')?\n\nCuotas + material, todo lo que sea Recibo y no esté girado.')) return;
  const recibos = pend.map(f=>({cliente:f.cliente, nif:f.cif, importe:f.total, facturas:[f.serie+'-'+f.numero]}));
  const b=$('#bRemGlobal'); if(b){ b.disabled=true; b.textContent='Generando…'; }
  try{
    const r=await fetch(API+'/remesa/generar',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({banco:'Sabadell', confirmar:1, recibos:recibos})}).then(r=>r.json());
    if(!r.ok){ alert('Error: '+(r.error||'')); cargarRem(); return; }
    if(r.contenido_b64){ const a=document.createElement('a'); a.href='data:text/plain;base64,'+r.contenido_b64; a.download=r.fichero||'remesa.txt'; a.click(); }
    const faltan=(r.faltan_mandato||[]).length;
    alert('✅ Remesa generada: '+r.n+' recibos · '+eur(r.total)+(faltan?('\n\n⚠️ '+faltan+' sin mandato SEPA (fuera) — necesitan firmar el mandato primero.'):'')+'\n\nSúbela al banco por "Enviar ficheros". Al recargar, las giradas saldrán como remesadas.');
    cargarRem();
  }catch(e){ alert('Error: '+e.message); cargarRem(); }
}
async function cargarHist(){
  $('#histView').innerHTML='<div class="loading">Cargando histórico…</div>';
  try{
    const j = await fetch(API+'/facturacion/historico?nocache='+Date.now()).then(r=>r.json());
    HIST = j.facturas||[]; renderHist(j);
  }catch(e){ $('#histView').innerHTML='<div class="loading">Error: '+esc(e.message)+'</div>'; }
}
function renderHist(j){
  if(!HIST.length){ $('#histView').innerHTML='<div class="loading">Aún no hay facturas emitidas desde el panel.</div>'; return; }
  const domic = HIST.filter(f=>f.forma_pago_id==8 && !f.remesada);
  const pend = HIST.filter(f=>!f.email_enviado);
  let bar='<div class="hbar"><span class="pill" style="background:#0f1f5c;color:#fff"><b>'+j.n+'</b> facturas · '+eur(j.total)+'</span>';
  if(pend.length) bar+='<button class="btn pri" id="bMailAll">✉️ Enviar todas pendientes ('+pend.length+')</button>';
  if(domic.length) bar+='<button class="btn pri" id="bRemesa">🏦 Generar remesa ('+domic.length+')</button>';
  bar+='<button class="btn gho" id="bCobros">🔄 Actualizar cobros</button>';
  bar+='</div>';
  $('#histView').innerHTML = bar + HIST.map(hcard).join('');
  const br=$('#bRemesa'); if(br) br.onclick=generarRemesa;
  const bm=$('#bMailAll'); if(bm) bm.onclick=enviarTodas;
  const bc=$('#bCobros'); if(bc) bc.onclick=actualizarCobros;
}
async function actualizarCobros(){
  const bc=$('#bCobros'); if(bc){ bc.disabled=true; bc.textContent='Cruzando banco…'; }
  try{
    const r = await fetch(API+'/facturacion/refrescar_cobros',{method:'POST'}).then(r=>r.json());
    alert(r.n? ('✅ '+r.n+' factura(s) marcadas cobradas:\n'+r.cobradas.map(x=>'· '+x.ref+' '+x.cliente+' ('+eur(x.importe)+')').join('\n'))
              : 'No se ha encontrado ningún cobro nuevo en el banco que cuadre.');
    cargarHist();
  }catch(e){ alert('Error: '+e.message); cargarHist(); }
}
async function enviarTodas(){
  const pend = HIST.filter(f=>!f.email_enviado);
  if(!pend.length){ alert('No hay pendientes de enviar.'); return; }
  if(!confirm('Enviar por email las '+pend.length+' facturas pendientes? (PDF a cada cliente, con la plantilla del panel)')) return;
  const bm=$('#bMailAll'); if(bm){ bm.disabled=true; }
  let enviadas=0; const sinEmail=[], errores=[];
  for(const f of pend){
    const ref=f.serie+'-'+f.numero;
    if(bm) bm.textContent='Enviando '+ref+'…';
    let para=(await emailAgora(f)) || (f.email_to||'').trim();
    if(!para||para.indexOf('@')<0){ sinEmail.push(ref+' · '+f.cliente); continue; }
    try{ await _mandarFactura(f, para); enviadas++; }
    catch(e){ errores.push(ref+': '+e.message); }
  }
  let msg='✅ Enviadas: '+enviadas;
  if(sinEmail.length) msg+='\n\n⚠️ Sin email ('+sinEmail.length+') — ponlo con ✉️:\n'+sinEmail.join('\n');
  if(errores.length) msg+='\n\n❌ Errores:\n'+errores.join('\n');
  alert(msg); cargarHist();
}
function hcard(f){
  const em=f.email_enviado, re=f.remesada, co=f.cobrada;
  const fp=f.forma_pago_id==8?'Recibo':'Transferencia';
  return '<div class="hcard"><div class="hhead"><div style="min-width:0">'
    +'<div class="hname">'+esc(f.serie+'-'+f.numero)+' · '+esc(f.cliente)+'</div>'
    +'<div class="hsub">'+(f.centro?esc(f.centro)+' · ':'')+(f.fecha||'').slice(0,10)+' · '+fp+'</div>'
    +'<div><span class="st '+(em?'on':'off')+'">📧 '+(em?'enviada':'sin enviar')+'</span>'
    +(f.forma_pago_id==8?'<span class="st '+(re?'on':'off')+'">🏦 '+(re?'remesada':'sin remesar')+'</span>':'')
    +'<span class="st '+(co?'on':'off')+'">✅ '+(co?'cobrada':'pendiente')+'</span></div></div>'
    +'<div class="htot">'+eur(f.total)+'</div></div>'
    +'<div class="hbtns"><button class="btn gho" onclick="verPDF('+f.id+')">👁 PDF</button>'
    +'<button class="btn pri" onclick="emailDe('+f.id+')">✉️ '+(em?'reenviar':'enviar')+'</button></div></div>';
}
function _cuerpoMail(ref){ return 'Hola,\n\nAdjuntamos la factura '+ref+'.\n\nUn saludo,\nJS Technology Menorca SL'; }
async function _mandarFactura(f, para){
  const ref=f.serie+'-'+f.numero;
  const doc=await docAgora(f.id);
  const blob=await generarPDFBlobC(doc);
  const b64=await blobABase64C(blob);
  const r=await fetch(API+'/correo/enviar',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({de:'info@js-tech.es', para:para, asunto:'Factura '+ref+' · JS Technology Menorca',
      cuerpo:_cuerpoMail(ref), adjuntos:[{nombre:'Factura_'+ref+'.pdf', base64:b64}]})}).then(r=>r.json());
  if(!r.ok) throw new Error(r.error||'envío falló');
  await fetch(API+'/facturacion/historico/marcar',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id:f.id, campo:'email_enviado', valor:new Date().toISOString().slice(0,19)})});
  await fetch(API+'/facturacion/historico/marcar',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id:f.id, campo:'email_to', valor:para})});
  fetch(API+'/clientes/email',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({cliente:f.cliente, email:para})}).catch(()=>{});
}
async function emailAgora(f){
  // SIEMPRE el email de la ficha de Ágora. /clientes/email lee el Ágora JST con escaneo flexible de campos.
  try{
    const j = await fetch(API+'/clientes/email?cif='+encodeURIComponent(f.cif||'')+'&cliente='+encodeURIComponent(f.cliente||'')+'&t='+Date.now()).then(r=>r.json());
    if(j && j.email && j.email.indexOf('@')>=0) return j.email.trim();
  }catch(e){}
  try{ await cargarClientes(); const c=(CLIENTES||[]).find(x=>x.id===f.customer_id); if(c&&c.email&&c.email.indexOf('@')>=0) return c.email.trim(); }catch(e){}
  return '';
}
async function emailDe(id){
  const f = HIST.find(x=>x.id===id); if(!f) return;
  const ref = f.serie+'-'+f.numero;
  const ag = await emailAgora(f);
  const sugerido = ag || f.email_to || '';
  const para = prompt('Email para '+ref+' ('+f.cliente+'):'+(ag?'\n(tomado de la ficha de Ágora)':'\n⚠️ Este cliente NO tiene email en Ágora — ponlo en su ficha y saldrá solo.'), sugerido);
  if(!para) return;
  try{ await _mandarFactura(f, para); alert('✅ Enviada '+ref+' a '+para); cargarHist(); }
  catch(e){ alert('Error: '+e.message); }
}
async function generarRemesa(){
  const domic = HIST.filter(f=>f.forma_pago_id==8 && !f.remesada);
  if(!domic.length){ alert('No hay domiciliadas pendientes.'); return; }
  if(!confirm('Generar remesa SEPA de '+domic.length+' recibos ('+eur(domic.reduce((s,f)=>s+f.total,0))+')?')) return;
  const recibos = domic.map(f=>({cliente:f.cliente, nif:f.cif, importe:f.total, facturas:[f.serie+'-'+f.numero]}));
  try{
    const r = await fetch(API+'/remesa/generar',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({banco:'Sabadell', confirmar:1, recibos:recibos})}).then(r=>r.json());
    if(!r.ok){ alert('Error: '+(r.error||'')); return; }
    if(r.contenido_b64){ const a=document.createElement('a');
      a.href='data:text/plain;base64,'+r.contenido_b64; a.download=r.fichero||'remesa.txt'; a.click(); }
    const okNifs = new Set((r.recibos_ok||[]).map(x=>(x.nif||'').toUpperCase()));
    for(const f of domic){ if(okNifs.has((f.cif||'').toUpperCase())){
      await fetch(API+'/facturacion/historico/marcar',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({id:f.id, campo:'remesada', valor:new Date().toISOString().slice(0,19)})}); } }
    const faltan=(r.faltan_mandato||[]).length;
    alert('Remesa: '+r.n+' recibos · '+eur(r.total)+(faltan?(' · '+faltan+' sin mandato (fuera)'):'')+'. Súbela al banco por "Enviar ficheros".');
    cargarHist();
  }catch(e){ alert('Error: '+e.message); }
}

// ── Login (misma lógica que los otros paneles: usuarios de Ágora, solo perfiles admin) ──
async function doLogin(){
  const u=$('#lg-user').value.trim(); const p=$('#lg-pin').value.trim();
  const err=$('#lg-err'); err.textContent='';
  if(!u){ err.textContent='Introduce tu usuario.'; return; }
  try{
    const d=await fetch(API+'/api/export-master/?filter=Users').then(r=>r.json());
    const us=(d.Users||[]).find(x=>!x.DeletionDate && (x.Name||'').toLowerCase()===u.toLowerCase()
      && ( (!x.Password && !x.SmartphonePassword) || String(x.Password||'')===p || String(x.SmartphonePassword||'')===p ));
    if(!us){ err.textContent='Usuario o PIN incorrecto.'; return; }
    if((((us.Profile||'')+'').toLowerCase()).indexOf('admin')===-1){ err.textContent='Tu perfil no permite facturar.'; return; }
    localStorage.setItem('fact_user', JSON.stringify({nombre:us.Name, perfil:us.Profile}));
    $('#login-ov').style.display='none';
    arrancar();
  }catch(e){ err.textContent='Error de conexión.'; }
}
function arrancar(){ $('#mes').value = mesActual(); cargar(); }
['lg-user','lg-pin'].forEach(id=>{ const el=$('#'+id); if(el) el.addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); }); });
// puerta
if(localStorage.getItem('fact_user')){ $('#login-ov').style.display='none'; arrancar(); }
else { const lu=$('#lg-user'); if(lu) lu.focus(); }
</script>
