<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Repaso contable · Raquel</title>
<style>
  :root{ --verde:#e7f7ec; --verde-bd:#1f9d55; --rojo:#fdeaea; --rojo-bd:#dc2626; --line:#e2e8f0; --azul:#0f1f5c; }
  *{ box-sizing:border-box; }
  body{ font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif; margin:0; background:#f4f6fb; color:#1e293b; }
  header{ background:linear-gradient(135deg,#0f1f5c,#1e1b4b); color:#fff; padding:16px 18px; }
  header h1{ margin:0; font-size:20px; }
  header .sub{ font-size:13px; opacity:.85; margin-top:2px; }
  .wrap{ max-width:1000px; margin:0 auto; padding:14px 16px 40px; }
  .bar{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:14px 0; position:sticky; top:0; background:#f4f6fb; padding:10px 0; z-index:5; }
  select,button{ font-size:15px; padding:9px 12px; border:1px solid var(--line); border-radius:9px; background:#fff; cursor:pointer; }
  select{ font-weight:600; }
  .btn.on{ background:var(--azul); color:#fff; border-color:var(--azul); }
  .cont{ margin-left:auto; font-size:14px; font-weight:600; }
  .chip{ padding:4px 10px; border-radius:20px; margin-left:6px; }
  .chip.v{ background:var(--verde); color:#146c43; border:1px solid var(--verde-bd); }
  .chip.r{ background:var(--rojo); color:#b91c1c; border:1px solid var(--rojo-bd); }
  .row{ display:grid; grid-template-columns:1fr 118px 84px 124px; gap:8px; align-items:center; padding:11px 12px; border-radius:10px; margin-bottom:6px; border-left:6px solid transparent; }
  .acc{ display:flex; gap:3px; justify-content:flex-end; align-items:center; }
  .act{ cursor:pointer; font-size:16px; padding:2px 5px; border-radius:6px; user-select:none; line-height:1; }
  .act.ok{ background:#c9f2d5; } .act.ok:hover{ background:#a7e8bb; }
  .act.no{ background:#fbd5d5; } .act.no:hover{ background:#f5b5b5; }
  .row.v{ background:var(--verde); border-left-color:var(--verde-bd); }
  .row.r{ background:var(--rojo); border-left-color:var(--rojo-bd); }
  .prov{ font-weight:700; }
  .fac{ font-size:12px; color:#475569; margin-top:1px; word-break:break-word; }
  .fecha{ font-size:13px; color:#334155; }
  .imp{ font-weight:700; text-align:right; }
  .ver{ text-align:center; cursor:pointer; font-size:18px; text-decoration:none; }
  .provgrp{ font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:#64748b; margin:14px 0 4px; font-weight:700; }
  .muted{ color:#94a3b8; padding:20px; text-align:center; }
  @media(max-width:560px){ .row{ grid-template-columns:1fr 64px 94px; } .fecha{ display:none; } }
  /* login */
  #lg{ position:fixed; inset:0; background:linear-gradient(135deg,#0f1f5c,#1a2e6e); display:flex; align-items:center; justify-content:center; z-index:100; }
  #lg .card{ background:#fff; border-radius:18px; padding:36px; width:360px; max-width:92%; text-align:center; }
  #lg input{ width:100%; padding:13px; font-size:15px; border:2px solid #e2e8f0; border-radius:10px; margin-top:8px; text-align:center; }
  #lg button{ width:100%; padding:14px; background:#0f1f5c; color:#fff; border:none; border-radius:10px; font-weight:700; margin-top:16px; font-size:15px; }
  #lg .err{ color:#dc2626; font-size:13px; min-height:18px; margin-top:8px; }
</style>
</head>
<body>
<div id="lg">
  <div class="card">
    <div style="font-size:40px">🧮</div>
    <h2 style="color:#0f1f5c;margin:6px 0">Repaso contable</h2>
    <div style="color:#64748b;font-size:13px">JS Technology Menorca SL</div>
    <input id="lgu" placeholder="Usuario" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()">
    <input id="lgp" type="password" placeholder="PIN o contraseña (vacío si no)" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="err" id="lge"></div>
    <button onclick="doLogin()">Entrar →</button>
  </div>
</div>

<header>
  <h1>🧮 Repaso contable</h1>
  <div class="sub">🟢 verde = contabilizada en SisConta · 🔴 rojo = pendiente de contabilizar</div>
</header>
<div class="wrap">
  <div class="tabs" style="display:flex;gap:8px;margin:12px 0 8px;flex-wrap:wrap">
    <button id="tEmi" onclick="switchVista('emi')" style="font-weight:700;font-size:15px;padding:9px 14px;border-radius:9px;cursor:pointer;border:1px solid var(--line);background:#fff;color:#334155">📤 Emitidas</button>
    <button id="tRec" onclick="switchVista('rec')" style="font-weight:700;font-size:15px;padding:9px 14px;border-radius:9px;cursor:pointer;border:1px solid var(--line);background:var(--azul);color:#fff">📥 Recibidas</button>
    <button id="tIva" onclick="switchVista('iva')" style="font-weight:700;font-size:15px;padding:9px 14px;border-radius:9px;cursor:pointer;border:1px solid var(--line);background:#fff;color:#334155">🧾 IVA · 303</button>
  </div>
  <div id="vEmitidas" style="display:none">
    <div class="bar">
      <label>Mes <select id="selMesE"></select></label>
      <button class="btn on" id="ordCliE" onclick="setOrdenE('cliente')">Ordenar: Cliente</button>
      <button class="btn" id="ordFechaE" onclick="setOrdenE('fecha')">Fecha</button>
      <span class="cont"><span class="chip v" id="cVE">✅ 0</span><span class="chip r" id="cRE">⬜ 0</span></span>
    </div>
    <div id="listaE"><div class="muted">Cargando…</div></div>
  </div>
  <div id="vRepaso">
  <div class="bar">
    <label>Mes <select id="selMes"></select></label>
    <button class="btn on" id="ordProv" onclick="setOrden('prov')">Ordenar: Proveedor</button>
    <button class="btn" id="ordFecha" onclick="setOrden('fecha')">Fecha</button>
    <button class="btn" id="btnIA" onclick="leerProveedoresIA()" style="background:#ede9fe;border-color:#c4b5fd;color:#5b21b6;font-weight:700" title="Lee el nombre fiscal real de los proveedores que salen sucios (carpeta genérica, cabecera OCR, dirección) con IA. Amazon se agrupa. Se recuerda para no repetir.">🔍 Leer proveedores (IA)</button>
    <span class="cont"><span class="chip v" id="cV">🟢 0</span><span class="chip r" id="cR">🔴 0</span></span>
  </div>
  <div id="lista"><div class="muted">Cargando…</div></div>
  </div>
  <div id="vIva" style="display:none"><div class="muted">Cargando IVA…</div></div>
</div>

<script>
const API = 'https://panel.js-tech.es';
const $ = s=>document.querySelector(s);
let DATA=[], MES='', ORD='prov';
function esc(s){ return (s==null?'':''+s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function eur(n){ return (Number(n)||0).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'; }

async function cargar(){
  try{
    const j = await fetch(API+'/contabilidad/repaso_contable?anio=2026&nc='+Date.now()).then(r=>r.json());
    DATA = j.facturas||[];
    const sel=$('#selMes'); const meses=j.meses||[];
    sel.innerHTML = meses.map(m=>'<option value="'+esc(m)+'">'+esc(m)+'</option>').join('');
    // mes por defecto = el mes ACTUAL si existe; si no, el último mes real (no "AMAZON TARJETA" ni sueltos)
    const hoyNum = new Date().getMonth()+1;
    const reales = DATA.filter(x=>x.mes_num<99);
    let def='';
    const actual = reales.find(x=>x.mes_num===hoyNum);
    if(actual) def=actual.mes_carpeta;
    else if(reales.length){ const mx=Math.max(...reales.map(x=>x.mes_num)); def=(reales.find(x=>x.mes_num===mx)||{}).mes_carpeta; }
    // ⭐ Mantener el MES que estaba revisando (al corregir un nombre / marcar, no saltar a julio) si sigue existiendo
    MES = (MES && meses.includes(MES)) ? MES : (def || (meses.length ? meses[meses.length-1] : ''));
    sel.value = MES;
    sel.onchange = ()=>{ MES=sel.value; render(); };
    render();
  }catch(e){ $('#lista').innerHTML='<div class="muted">Error cargando: '+esc(e.message)+'</div>'; }
}
function setOrden(o){ ORD=o; $('#ordProv').className='btn'+(o==='prov'?' on':''); $('#ordFecha').className='btn'+(o==='fecha'?' on':''); render(); }

// ── Pestañas: Repaso ↔ IVA/303 ──
let _ivaCargado=false, _emiCargado=false, _iva303=null;
function _tabBtn(id,on){ const b=$(id); if(b){ b.style.background=on?'var(--azul)':'#fff'; b.style.color=on?'#fff':'#334155'; } }
function switchVista(v){
  $('#vEmitidas').style.display = v==='emi'?'':'none';
  $('#vRepaso').style.display   = v==='rec'?'':'none';
  $('#vIva').style.display      = v==='iva'?'':'none';
  _tabBtn('#tEmi', v==='emi'); _tabBtn('#tRec', v==='rec'); _tabBtn('#tIva', v==='iva');
  if(v==='emi' && !_emiCargado){ _emiCargado=true; cargarEmi(); }
  if(v==='iva' && !_ivaCargado){ _ivaCargado=true; cargarIVA(); }
}
async function _getIva(force){ if(force||!_iva303){ _iva303=await fetch(API+'/contabilidad/iva_303?anio=2026&nc='+Date.now()).then(r=>r.json()); } return _iva303; }
function mesLabel(m){ const n=['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre']; const p=(m||'').split('-'); return (n[+p[1]]||m)+' '+(p[0]||''); }

// ── EMITIDAS (mismo estilo que Recibidas; marcar contabilizada ✅/⬜) ──
let MESE='', ORDE='cliente', EMI=[];
async function cargarEmi(){
  try{
    const j=await _getIva(); EMI=j.emitidas||[];
    const sel=$('#selMesE');
    const meses=[...new Set(EMI.map(f=>(f.fecha||'').slice(0,7)).filter(Boolean))].sort();
    sel.innerHTML=meses.map(m=>'<option value="'+m+'">'+esc(mesLabel(m))+'</option>').join('');
    const hoyM=new Date().toISOString().slice(0,7);
    MESE=(MESE&&meses.includes(MESE))?MESE:(meses.includes(hoyM)?hoyM:(meses[meses.length-1]||''));
    sel.value=MESE; sel.onchange=()=>{ MESE=sel.value; renderEmi(); };
    renderEmi();
  }catch(e){ $('#listaE').innerHTML='<div class="muted">Error: '+esc(e.message)+'</div>'; }
}
function setOrdenE(o){ ORDE=o; $('#ordCliE').className='btn'+(o==='cliente'?' on':''); $('#ordFechaE').className='btn'+(o==='fecha'?' on':''); renderEmi(); }
function renderEmi(){
  let fs=EMI.filter(f=>(f.fecha||'').slice(0,7)===MESE);
  const nV=fs.filter(f=>f.contabilizada).length, nR=fs.length-nV;
  $('#cVE').textContent='✅ '+nV; $('#cRE').textContent='⬜ '+nR;
  if(ORDE==='cliente') fs.sort((a,b)=>(a.cliente||'').localeCompare(b.cliente||'',{sensitivity:'base'})||(a.fecha||'').localeCompare(b.fecha||''));
  else fs.sort((a,b)=>(a.fecha||'').localeCompare(b.fecha||''));
  if(!fs.length){ $('#listaE').innerHTML='<div class="muted">No hay facturas emitidas en este mes.</div>'; return; }
  let html='';
  fs.forEach(f=>{
    const fk=(f.serie||'')+'-'+f.numero, done=!!f.contabilizada;
    html+='<div class="row '+(done?'v':'r')+'">'
      +'<div><div class="prov">'+esc(f.cliente||'—')+'</div><div class="fac">'+esc(fk)+' · base '+eur(f.base)+' · IVA '+eur(f.cuota)+'</div></div>'
      +'<div class="fecha">'+esc(f.fecha||'')+'</div>'
      +'<div class="imp">'+eur(f.total)+'</div>'
      +'<div class="acc"><span class="act '+(done?'ok':'no')+'" title="Marcar contabilizada" onclick="marcarEmitida(\''+esc(fk)+'\','+(!done)+')">'+(done?'✅':'⬜')+'</span></div>'
      +'</div>';
  });
  $('#listaE').innerHTML=html;
}
async function marcarEmitida(fk, contab){
  try{
    const r=await fetch(API+'/contabilidad/emitida_contab',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({factura:fk, contabilizada:contab})}).then(x=>x.json());
    if(!r.ok){ alert('Error: '+(r.error||'')); return; }
    EMI.forEach(f=>{ if(((f.serie||'')+'-'+f.numero)===fk) f.contabilizada=contab; });
    renderEmi();
  }catch(e){ alert('Error: '+e.message); }
}
async function cargarIVA(){
  try{ renderIVA(await _getIva()); }
  catch(e){ $('#vIva').innerHTML='<div class="muted">Error: '+esc(e.message)+'</div>'; }
}
function renderIVA(j){
  const T=j.trimestres||[], A=j.anual||{};
  const nom=['','1T (ene-mar)','2T (abr-jun)','3T (jul-sep)','4T (oct-dic)'];
  let h='<div style="background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;margin-top:6px">';
  h+='<h2 style="margin:0 0 4px;color:var(--azul)">🧾 IVA '+esc(j.anio)+' · ayuda para el modelo 303</h2>';
  h+='<div style="font-size:12px;color:#64748b;margin-bottom:12px">IVA repercutido (facturas emitidas F/FD) − IVA soportado (facturas de proveedor). La nómina NO lleva IVA. La inversión del sujeto pasivo y los no-deducibles los ajusta Raquel con su criterio.</div>';
  h+='<table style="width:100%;border-collapse:collapse;font-size:14px"><thead><tr style="text-align:right;color:#64748b;border-bottom:2px solid var(--line)">'
    +'<th style="text-align:left;padding:8px 6px">Trimestre</th><th style="padding:8px 6px">IVA repercutido</th><th style="padding:8px 6px">IVA soportado</th><th style="padding:8px 6px">Resultado</th><th style="padding:8px 6px">Fras</th></tr></thead><tbody>';
  T.forEach(q=>{
    const col=q.resultado>=0?'#b91c1c':'#146c43';
    h+='<tr style="text-align:right;border-bottom:1px solid #eef2f7">'
      +'<td style="text-align:left;padding:8px 6px;font-weight:700">'+nom[q.trimestre]+'</td>'
      +'<td style="padding:8px 6px">'+eur(q.repercutido_cuota)+'</td>'
      +'<td style="padding:8px 6px">'+eur(q.soportado_cuota)+'</td>'
      +'<td style="padding:8px 6px;font-weight:800;color:'+col+'">'+eur(q.resultado)+'</td>'
      +'<td style="padding:8px 6px;color:#94a3b8">'+q.n_emitidas+'e · '+q.n_recibidas+'r</td></tr>';
  });
  const acol=(A.resultado>=0)?'#b91c1c':'#146c43';
  h+='<tr style="text-align:right;border-top:2px solid var(--line);font-weight:800"><td style="text-align:left;padding:10px 6px">AÑO</td>'
    +'<td style="padding:10px 6px">'+eur(A.repercutido_cuota)+'</td><td style="padding:10px 6px">'+eur(A.soportado_cuota)+'</td>'
    +'<td style="padding:10px 6px;color:'+acol+'">'+eur(A.resultado)+'</td><td></td></tr>';
  h+='</tbody></table>';
  h+='<div style="font-size:12px;color:#64748b;margin-top:8px"><b style="color:#b91c1c">Rojo = a pagar</b> · <b style="color:#146c43">verde = a compensar/devolver</b>.</div>';
  h+='</div>';
  $('#vIva').innerHTML=h;
}
function render(){
  let fs = DATA.filter(x=>x.mes_carpeta===MES);
  const nV = fs.filter(x=>x.contabilizada).length, nR = fs.length-nV;
  $('#cV').textContent='🟢 '+nV; $('#cR').textContent='🔴 '+nR;
  if(ORD==='prov') fs.sort((a,b)=>(a.proveedor||'').localeCompare(b.proveedor||'',{sensitivity:'base'}) || (a.fecha||'').localeCompare(b.fecha||''));
  else fs.sort((a,b)=>(a.fecha||'').localeCompare(b.fecha||'') || (a.proveedor||'').localeCompare(b.proveedor||''));
  if(!fs.length){ $('#lista').innerHTML='<div class="muted">No hay facturas en este mes.</div>'; return; }
  window._fsActual = fs;
  let html='', lastProv=null;
  fs.forEach((x,i)=>{
    if(ORD==='prov'){ const p=(x.proveedor||'—').toUpperCase(); if(p!==lastProv){ html+='<div class="provgrp">'+esc(x.proveedor||'—')+'</div>'; lastProv=p; } }
    const rel = (x.ruta||'').split('/').slice(1).join('/');
    const ver='<a class="ver" href="'+API+'/proveedores/abrir?anio='+encodeURIComponent(x.anio)+'&ruta='+encodeURIComponent(rel)+'" target="_blank" title="Ver factura">👁</a>';
    const acc = x.contabilizada ? ver
      : ver+'<span class="act" style="background:#e0e7ff" title="Corregir el nombre del proveedor (se recuerda)" onclick="corregirNombre('+i+')">✏️</span>'
           +'<span class="act ok" title="Marcar contabilizada (mover a la carpeta del proveedor)" onclick="marcarCont('+i+')">✓</span>'
           +'<span class="act no" title="No es una factura (mover a PARA BORRAR)" onclick="noFactura('+i+')">🚫</span>';
    html+='<div class="row '+(x.contabilizada?'v':'r')+'">'
      +'<div><div class="prov">'+esc(x.proveedor||'—')+'</div><div class="fac">'+esc(x.nombre||'')+'</div></div>'
      +'<div class="fecha">'+esc(x.fecha||'')+'</div>'
      +'<div class="imp">'+eur(x.total)+'</div>'
      +'<div class="acc">'+acc+'</div>'
      +'</div>';
  });
  $('#lista').innerHTML=html;
}
async function marcarCont(i){
  const x=(window._fsActual||[])[i]; if(!x) return;
  const prov=prompt('✓ Marcar como CONTABILIZADA y mover a la carpeta del proveedor.\n\nNombre del proveedor (revísalo/corrígelo):', x.proveedor||'');
  if(prov===null) return;
  if(!prov.trim()){ alert('Pon el nombre del proveedor.'); return; }
  try{
    const r=await fetch(API+'/contabilidad/marcar_contabilizada',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ruta:x.ruta, proveedor:prov.trim(), total:x.total, fecha:x.fecha})}).then(r=>r.json());
    if(r.ok){ cargar(); } else alert('Error: '+(r.error||''));
  }catch(e){ alert('Error: '+e.message); }
}
async function noFactura(i){
  const x=(window._fsActual||[])[i]; if(!x) return;
  const mot=prompt('🚫 Esto NO es una factura → se mueve a PARA BORRAR y el panel lo recordará.\n\n¿Por qué no es factura? (motivo):','');
  if(mot===null) return;
  try{
    const r=await fetch(API+'/contabilidad/no_es_factura',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ruta:x.ruta, motivo:(mot||'').trim()})}).then(r=>r.json());
    if(r.ok){ cargar(); } else alert('Error: '+(r.error||''));
  }catch(e){ alert('Error: '+e.message); }
}
async function corregirNombre(i){
  const x=(window._fsActual||[])[i]; if(!x) return;
  const nom=prompt('✏️ Nombre correcto del proveedor (se recordará para esta factura, sin volver a leerla):', x.proveedor||'');
  if(nom===null || !nom.trim()) return;
  try{
    const r=await fetch(API+'/contabilidad/repaso_nombre',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ruta:x.ruta, proveedor:nom.trim()})}).then(r=>r.json());
    if(r.ok){
      // actualiza EN MEMORIA y re-renderiza (NO recarga → no pierde el mes ni el foco)
      const nn=(r.proveedor||nom.trim());
      DATA.forEach(d=>{ if(d.ruta===x.ruta) d.proveedor=nn; });
      render();
    } else alert('Error: '+(r.error||''));
  }catch(e){ alert('Error: '+e.message); }
}

// ── Leer el nombre fiscal real de los proveedores sucios con IA (en tandas hasta acabar) ──
let _iaRun=false;
async function leerProveedoresIA(){
  if(_iaRun) return; _iaRun=true;
  const b=$('#btnIA'); const t0=b.textContent;
  try{
    let vueltas=0, hechas=0;
    while(vueltas<40){
      vueltas++;
      const r=await fetch(API+'/contabilidad/repaso_ocr_nombres',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({anio:'2026', max:8})}).then(r=>r.json());
      if(!r.ok){ alert('Error: '+(r.error||'')); break; }
      hechas+=(r.procesadas||0);
      b.textContent='🔍 Leyendo… '+hechas+' hechas · quedan '+(r.quedan||0);
      if((r.quedan||0)<=0 || (r.procesadas||0)===0) break;
    }
    b.textContent='✅ '+hechas+' leídas';
    cargar();
    setTimeout(()=>{ b.textContent=t0; }, 4000);
  }catch(e){ alert('Error: '+e.message); b.textContent=t0; }
  finally{ _iaRun=false; }
}

// ── Login (usuarios de Ágora, solo perfiles admin — igual que los otros paneles) ──
async function doLogin(){
  const u=$('#lgu').value.trim(), p=$('#lgp').value.trim(), err=$('#lge'); err.textContent='';
  if(!u){ err.textContent='Introduce tu usuario.'; return; }
  try{
    const d=await fetch(API+'/api/export-master/?filter=Users').then(r=>r.json());
    const us=(d.Users||[]).find(x=>!x.DeletionDate && (x.Name||'').toLowerCase()===u.toLowerCase()
      && ((!x.Password && !x.SmartphonePassword) || String(x.Password||'')===p || String(x.SmartphonePassword||'')===p));
    if(!us){ err.textContent='Usuario o PIN incorrecto.'; return; }
    if((((us.Profile||'')+'').toLowerCase()).indexOf('admin')===-1){ err.textContent='Tu perfil no tiene acceso.'; return; }
    localStorage.setItem('repaso_user', JSON.stringify({nombre:us.Name}));
    $('#lg').style.display='none'; cargar();
  }catch(e){ err.textContent='Error de conexión.'; }
}
if(localStorage.getItem('repaso_user')){ $('#lg').style.display='none'; cargar(); }
else { $('#lgu').focus(); }
